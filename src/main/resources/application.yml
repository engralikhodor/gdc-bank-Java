spring:
  application:
    name: banking-app
    bankName: "GDC Bank"

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bgapp}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:961code@gmail.com}
    password: ${MAIL_PASSWORD:zvikjtbccdozpsty}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 50


logging:
  level:
    org.springframework.web: INFO
    com.alikhdr.bankingApp: DEBUG
    org.hibernate.SQL: INFO

ai:
  openai:
    enabled: true
    api-key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com/v1
    model: gpt-4.1-mini
    timeout-ms: 5000
    max-tokens: 300
    requests-per-minute: 30

